name: Release plugin QGIS

# Si attiva quando pubblichi un tag tipo v2.0.0, v2.1.0, ecc.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repository (branch main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Ricava la versione dal tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verifica coerenza con metadata.txt
        run: |
          META_VERSION=$(grep -E '^version=' vista_v2/metadata.txt | cut -d= -f2 | tr -d '[:space:]')
          if [ "$META_VERSION" != "${{ steps.version.outputs.VERSION }}" ]; then
            echo "ERRORE: il tag è v${{ steps.version.outputs.VERSION }} ma metadata.txt dichiara version=$META_VERSION"
            echo "Aggiorna metadata.txt prima di creare il tag."
            exit 1
          fi

      - name: Crea lo zip del plugin
        run: |
          zip -r vista_v2.zip vista_v2/ \
            -x "*.pyc" -x "*__pycache__*" -x "*.DS_Store"

      - name: Aggiorna plugins.xml con la nuova versione
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          TODAY=$(date +%Y-%m-%d)
          sed -i \
            -e "s|<pyqgis_plugin name=\"VISTA\" version=\"[^\"]*\"|<pyqgis_plugin name=\"VISTA\" version=\"$VERSION\"|" \
            -e "s|<version>[^<]*</version>|<version>$VERSION</version>|" \
            -e "s|/releases/download/v[^/]*/vista_v2.zip|/releases/download/v$VERSION/vista_v2.zip|" \
            -e "s|<update_date>[^<]*</update_date>|<update_date>$TODAY</update_date>|" \
            plugins.xml

      - name: Committa plugins.xml aggiornato
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins.xml
          git diff --cached --quiet || git commit -m "Aggiorna plugins.xml alla versione ${{ steps.version.outputs.VERSION }}"
          git push origin main

      - name: Crea la release con lo zip allegato
        uses: softprops/action-gh-release@v2
        with:
          files: vista_v2.zip
          name: VISTA v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
